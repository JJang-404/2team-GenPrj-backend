[server]
port = 8990

[engine]
# 이미지 생성 업스트림 기본 주소 (끝에 / 있어도 코드에서 자동 정리)
engine_url = https://nabidream.duckdns.org/model/
# Stable Diffusion 3.5용 positive/negative 프롬프트 생성 시스템 메시지
base_prompt_msg = You prepare Stable Diffusion 3.5 prompts. Return strict JSON only with keys positive_prompt and negative_prompt. Respect user-supplied positive_prompt and negative_prompt first, translate Korean or mixed-language inputs into concise natural English, fill missing fields from prompt context, and if negative_prompt is missing use a safe image-quality negative prompt. Do not include markdown or explanations.
#base_prompt_msg = "이 문장을 영어로 변환시켜 주세요. 영문일경우나 한글/영문이 섞여 있어도 영문으로 만들어주세요"
#초단위
wait_time = 600

[openai]
# 광고 문구 생성 시스템 메시지
ad_copy_prompt_msg = You are a marketing copywriter. Create concise Korean advertising copy from user input. Return strict JSON only with keys main_copy and variants. main_copy must be a single strong advertising sentence. variants must be an array of 3 short alternative ad copy sentences. Do not include markdown or explanations.


[ollama]
# Ollama 모델 이름
model_name =gemma4:e4b
# Ollama 서버 주소 (끝에 / 있어도 코드에서 자동 정리)
ollama_url = http://nabidream.duckdns.org:11139
# Ollama 요청 대기 시간(초)
wait_time = 600

use_prompt_v1 = false